<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HackLab</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<!-- v2.1 -->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fira+Mono:wght@400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --green: #00ff41;
    --green-dim: #00aa2a;
    --green-dark: #003b00;
    --red: #ff3333;
    --amber: #ffaa00;
    --cyan: #00e5ff;
    --bg: #0a0a0a;
    --panel: #0f0f0f;
    --border: #1a3a1a;
  }

  body {
    background: var(--bg);
    color: var(--green);
    font-family: 'Fira Mono', 'Courier New', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* CRT scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.15) 2px,
      rgba(0, 0, 0, 0.15) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 16px;
    display: grid;
    grid-template-rows: auto 1fr;
    grid-template-columns: 1fr;
    gap: 12px;
    height: 100vh;
  }

  .main-split {
    display: flex;
    min-height: 0;
    gap: 0;
  }

  .left-col {
    display: flex;
    flex-direction: column;
    min-width: 200px;
    min-height: 0;
    flex: 1 1 50%;
  }

  .right-col {
    display: flex;
    flex-direction: column;
    min-width: 200px;
    min-height: 0;
    flex: 1 1 50%;
  }

  /* Drag handles */
  .resize-handle-h {
    width: 6px;
    cursor: col-resize;
    background: transparent;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }

  .resize-handle-h::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 2px;
    height: 40px;
    background: var(--border);
    border-radius: 1px;
    transition: background 0.2s, height 0.2s;
  }

  .resize-handle-h:hover::after,
  .resize-handle-h.active::after {
    background: var(--green-dim);
    height: 60px;
  }

  .resize-handle-v {
    height: 6px;
    cursor: row-resize;
    background: transparent;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }

  .resize-handle-v::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 40px;
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    transition: background 0.2s, width 0.2s;
  }

  .resize-handle-v:hover::after,
  .resize-handle-v.active::after {
    background: var(--green-dim);
    width: 60px;
  }

  /* Header */
  .header {
    grid-column: 1 / -1;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
    padding-bottom: 12px;
  }

  .logo {
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: 2px;
  }

  .logo span { color: var(--red); }

  .stage-indicator {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .stage-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 2px solid var(--green-dim);
    transition: all 0.3s;
    cursor: pointer;
    position: relative;
  }

  .stage-dot:hover {
    border-color: var(--green);
    transform: scale(1.2);
  }

  .stage-dot .stage-tooltip {
    display: none;
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--green);
    font-size: 0.65rem;
    padding: 4px 8px;
    border-radius: 4px;
    white-space: nowrap;
    margin-bottom: 6px;
    pointer-events: none;
  }

  .stage-dot:hover .stage-tooltip { display: block; }

  .stage-dot.completed { background: var(--green); border-color: var(--green); }
  .stage-dot.active { border-color: var(--amber); box-shadow: 0 0 8px var(--amber); }

  /* Panels */
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-title {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--green-dim);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  /* Mission briefing (left column, full height) */
  .mission-panel {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
  }

  .mission-text {
    font-size: 0.9rem;
    line-height: 1.7;
    white-space: pre-wrap;
  }

  .mission-text .highlight { color: var(--amber); font-weight: 700; }
  .mission-text .cmd { color: var(--cyan); }

  /* SQL Query visualizer (top of right column) */
  .query-panel {
    flex: 0 0 auto;
    min-height: 80px;
    overflow-y: auto;
  }

  .query-display {
    background: #1e1e1e;
    border: 1px solid #333;
    border-radius: 4px;
    padding: 0;
    font-size: 0.85rem;
    line-height: 1.7;
    flex: 1;
    overflow-y: auto;
    min-height: 80px;
    position: relative;
  }

  .query-display .editor-topbar {
    display: flex;
    align-items: center;
    background: #2d2d2d;
    border-bottom: 1px solid #333;
    padding: 5px 12px;
    font-size: 0.7rem;
    color: #888;
    gap: 10px;
  }

  .query-display .editor-topbar .tab {
    background: #1e1e1e;
    border: 1px solid #333;
    border-bottom: 1px solid #1e1e1e;
    border-radius: 4px 4px 0 0;
    padding: 3px 12px;
    color: #ccc;
    font-size: 0.72rem;
    margin-bottom: -6px;
  }

  .query-display .editor-body {
    display: flex;
    min-height: 60px;
  }

  .query-display .line-numbers {
    padding: 12px 0;
    text-align: right;
    color: #555;
    font-size: 0.78rem;
    user-select: none;
    min-width: 36px;
    border-right: 1px solid #333;
    background: #1e1e1e;
  }

  .query-display .line-numbers div {
    padding: 0 8px;
    line-height: 1.7;
  }

  .query-display .code-area {
    padding: 12px 14px;
    flex: 1;
    white-space: pre-wrap;
    word-break: break-all;
  }

  /* VS Code Dark+ inspired token colors */
  .query-display .sql-keyword { color: #569cd6; }
  .query-display .sql-function { color: #dcdcaa; }
  .query-display .sql-string { color: #ce9178; }
  .query-display .sql-number { color: #b5cea8; }
  .query-display .sql-operator { color: #d4d4d4; }
  .query-display .sql-comment { color: #6a9955; font-style: italic; }
  .query-display .sql-identifier { color: #9cdcfe; }
  .query-display .sql-star { color: #d4d4d4; }
  .query-display .sql-paren { color: #ffd700; }
  .query-display .sql-comma { color: #d4d4d4; }
  .query-display .sql-injection { color: #f44747; background: rgba(244, 71, 71, 0.1); border-radius: 2px; }
  .query-display .sql-default { color: #d4d4d4; }

  .query-label {
    display: none;
  }

  .query-result {
    background: #050505;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px;
    font-size: 0.8rem;
    max-height: 140px;
    overflow-y: auto;
  }

  .query-result.error { border-color: var(--red); color: var(--red); }
  .query-result.success { border-color: var(--green); }

  .result-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.78rem;
  }

  .result-table th {
    text-align: left;
    color: var(--cyan);
    border-bottom: 1px solid var(--border);
    padding: 4px 8px;
  }

  .result-table td {
    padding: 4px 8px;
    border-bottom: 1px solid #111;
  }

  /* Interaction panel tabs */
  .interaction-panel {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    background: var(--panel);
    border: 1px solid var(--green-dim);
    border-radius: 6px;
    overflow: hidden;
  }

  .interaction-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .interaction-tab {
    padding: 8px 18px;
    font-family: inherit;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--green-dim);
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
  }

  .interaction-tab:hover { color: var(--green); }
  .interaction-tab.active {
    color: var(--green);
    border-bottom-color: var(--green);
  }

  .tab-content {
    display: none;
    flex: 1;
    min-height: 0;
    flex-direction: column;
  }

  .tab-content.active {
    display: flex;
  }

  /* Terminal (inside tab) */
  .terminal-panel {
    flex: 1;
    min-height: 0;
    padding: 16px;
    display: flex;
    flex-direction: column;
  }

  .terminal-scroll {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .terminal-output {
    font-size: 0.85rem;
    line-height: 1.6;
  }

  .terminal-output .sys { color: var(--green-dim); }
  .terminal-output .err { color: var(--red); }
  .terminal-output .warn { color: var(--amber); }
  .terminal-output .info { color: var(--cyan); }
  .terminal-output .success { color: var(--green); font-weight: 700; }

  .terminal-input-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 2px 0;
    min-height: 1.6em;
  }

  .prompt-symbol {
    color: var(--green);
    font-weight: 700;
    flex-shrink: 0;
    font-size: 0.85rem;
  }

  .terminal-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--green);
    font-family: inherit;
    font-size: 0.85rem;
    line-height: 1.6;
    caret-color: var(--green);
  }

  .terminal-input::placeholder { color: var(--green-dark); }

  /* Hint button */
  .hint-btn {
    background: transparent;
    border: 1px solid var(--amber);
    color: var(--amber);
    font-family: inherit;
    font-size: 0.75rem;
    padding: 4px 12px;
    border-radius: 4px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.2s;
  }

  .hint-btn:hover { background: rgba(255, 170, 0, 0.15); }

  .controls {
    display: flex;
    gap: 10px;
    align-items: center;
  }


  /* Login form UI (inside tab) */
  .login-ui {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    min-height: 0;
    padding: 24px;
  }

  .login-card {
    width: 100%;
    max-width: 340px;
    background: #161616;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 32px 28px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  .login-card .login-logo {
    text-align: center;
    margin-bottom: 24px;
  }

  .login-card .login-logo .company {
    font-size: 1.2rem;
    font-weight: 700;
    color: #ccc;
    letter-spacing: 2px;
  }

  .login-card .login-logo .subtitle {
    font-size: 0.7rem;
    color: #666;
    margin-top: 4px;
  }

  .login-field {
    margin-bottom: 16px;
  }

  .login-field label {
    display: block;
    font-size: 0.72rem;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .login-field input {
    width: 100%;
    background: #0f0f0f;
    border: 1px solid #333;
    border-radius: 4px;
    padding: 10px 12px;
    color: #ddd;
    font-family: inherit;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .login-field input:focus {
    border-color: #569cd6;
  }

  .login-submit {
    width: 100%;
    background: #2a5a8a;
    border: none;
    border-radius: 4px;
    padding: 10px;
    color: #fff;
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 4px;
    transition: background 0.2s;
  }

  .login-submit:hover { background: #3a6a9a; }

  .login-error {
    color: var(--red);
    font-size: 0.78rem;
    text-align: center;
    margin-top: 12px;
    min-height: 1.2em;
  }

  .login-url {
    text-align: center;
    font-size: 0.68rem;
    color: #555;
    margin-bottom: 16px;
    padding: 6px;
    background: #111;
    border-radius: 4px;
    border: 1px solid #222;
  }

  .login-url span { color: #888; }

  /* URL Bar UI (inside tab) */
  .urlbar-ui {
    flex-direction: column;
    flex: 1;
    min-height: 0;
    padding: 24px;
  }

  .urlbar-container {
    display: flex;
    align-items: center;
    gap: 0;
    background: #111;
    border: 1px solid #333;
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 16px;
  }

  .urlbar-prefix {
    padding: 10px 2px 10px 12px;
    color: #888;
    font-size: 0.82rem;
    white-space: nowrap;
    user-select: none;
  }

  .urlbar-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #ddd;
    font-family: inherit;
    font-size: 0.82rem;
    padding: 10px 12px 10px 0;
  }

  .urlbar-input::placeholder { color: #444; }

  .urlbar-go {
    background: #2a5a8a;
    border: none;
    color: #fff;
    font-family: inherit;
    font-size: 0.78rem;
    font-weight: 700;
    padding: 10px 18px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: background 0.2s;
  }

  .urlbar-go:hover { background: #3a6a9a; }

  .urlbar-response {
    flex: 1;
    overflow-y: auto;
    background: #0a0a0a;
    border: 1px solid #222;
    border-radius: 6px;
    padding: 16px;
    font-size: 0.85rem;
    line-height: 1.6;
    color: var(--green-dim);
  }

  .urlbar-response .sys { color: var(--green-dim); }
  .urlbar-response .err { color: var(--red); }
  .urlbar-response .warn { color: var(--amber); }
  .urlbar-response .info { color: var(--cyan); }
  .urlbar-response .success { color: var(--green); font-weight: 700; }

  /* Scrollbar styling */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--green-dark); border-radius: 3px; }

  /* Typing animation */
  @keyframes blink { 50% { opacity: 0; } }
  .cursor-blink::after {
    content: '_';
    animation: blink 1s step-end infinite;
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo">HACK<span>LAB</span> v1.0</div>
    <div class="controls">
      <button class="hint-btn" onclick="showHint()">HINT</button>
      <div class="stage-indicator" id="stageIndicator"></div>
    </div>
  </div>

  <div class="main-split">
    <div class="left-col">
      <div class="panel mission-panel">
        <div class="panel-title">Mission Briefing</div>
        <div class="mission-text" id="missionText"></div>
      </div>
      <!-- debrief modal is positioned fixed, outside flow -->
    </div>

    <div class="resize-handle-h" id="hHandle"></div>

    <div class="right-col">
      <div class="panel query-panel">
        <div class="panel-title">SQL Query Monitor</div>
        <div class="query-display" id="queryDisplay">
          <div class="editor-topbar"><span class="tab">query.sql</span><span>HackLab Monitor</span></div>
          <div class="editor-body">
            <div class="line-numbers"><div>1</div></div>
            <div class="code-area"><span class="sql-comment">-- Waiting for input...</span></div>
          </div>
        </div>
        <div class="query-label">Query Result</div>
        <div class="query-result" id="queryResult">
          <span style="color: var(--green-dim)">No queries executed yet.</span>
        </div>
      </div>

      <div class="resize-handle-v" id="vHandle"></div>

      <div class="interaction-panel">
        <div class="interaction-tabs">
          <button class="interaction-tab active" data-tab="terminal" onclick="switchTab('terminal')">Terminal</button>
          <button class="interaction-tab" data-tab="urlbar" onclick="switchTab('urlbar')" style="display:none">Browser</button>
          <button class="interaction-tab" data-tab="browser" onclick="switchTab('browser')" style="display:none">Login Form</button>
        </div>

        <div class="tab-content active" id="tabTerminal">
          <div class="terminal-panel">
            <div class="terminal-scroll" id="terminalScroll">
              <div class="terminal-output" id="terminalOutput"></div>
              <div class="terminal-input-row">
                <span class="prompt-symbol">hacklab&gt;</span>
                <input type="text" class="terminal-input" id="terminalInput"
                       placeholder="Type a command..." autofocus
                       onkeydown="if(event.key==='Enter')handleInput()">
              </div>
            </div>
          </div>
        </div>

        <div class="tab-content" id="tabUrlbar">
          <div class="urlbar-ui">
            <div class="urlbar-container">
              <span class="urlbar-prefix">https://portal.megacorp.local</span>
              <input type="text" class="urlbar-input" id="urlbarInput" placeholder="/profile?id=1"
                     onkeydown="if(event.key==='Enter')submitUrlbar()">
              <button class="urlbar-go" onclick="submitUrlbar()">Go</button>
            </div>
            <div class="urlbar-response" id="urlbarResponse">
              <span style="color: var(--green-dim)">Enter a URL path above and press Go.</span>
            </div>
          </div>
        </div>

        <div class="tab-content" id="tabBrowser">
          <div class="login-ui" id="loginUI">
            <div class="login-url"><span>https://</span>portal.megacorp.local/login</div>
            <div class="login-card">
              <!-- TODO: remove before deploy -->
              <!-- default test account: admin / password123 -->
              <div class="login-logo">
                <div class="company">MEGACORP</div>
                <div class="subtitle">Employee Portal</div>
              </div>
              <div class="login-field">
                <label>Username</label>
                <input type="text" id="loginUser" placeholder="Enter username"
                       onkeydown="if(event.key==='Enter')document.getElementById('loginPass').focus()">
              </div>
              <div class="login-field">
                <label>Password</label>
                <input type="password" id="loginPass" placeholder="Enter password"
                       onkeydown="if(event.key==='Enter')submitLoginForm()">
              </div>
              <button class="login-submit" onclick="submitLoginForm()">Sign In</button>
              <div class="login-error" id="loginError"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>


<script>
// ========== MOCK DATABASE ==========
const DB = {
  users: [
    { id: 1, username: 'jsmith',    password: 'p@ssw0rd123',    role: 'employee',  email: 'jsmith@megacorp.com',    department: 'Sales' },
    { id: 2, username: 'amendes',   password: 'sunshine99',     role: 'employee',  email: 'amendes@megacorp.com',   department: 'Marketing' },
    { id: 3, username: 'kwilson',   password: 'baseball2024',   role: 'manager',   email: 'kwilson@megacorp.com',   department: 'Engineering' },
    { id: 4, username: 'admin',     password: 'S3cur3#Admin!',  role: 'admin',     email: 'admin@megacorp.com',     department: 'IT' },
    { id: 5, username: 'dbrown',    password: 'qwerty456',      role: 'employee',  email: 'dbrown@megacorp.com',    department: 'HR' },
  ],
  sessions: [],
  audit_log: [],
};

// ========== MINI SQL ENGINE ==========
// Parses the *constructed* SQL string (after injection) and runs it against DB
function executeSql(rawSql) {
  const sql = rawSql.trim();
  const upper = sql.toUpperCase();

  // SELECT queries
  if (upper.startsWith('SELECT')) {
    return executeSelect(sql);
  }
  // UPDATE queries
  if (upper.startsWith('UPDATE')) {
    return executeUpdate(sql);
  }
  return { error: `Unsupported query type` };
}

function executeSelect(sql) {
  const upper = sql.toUpperCase();

  // Handle UNION-based queries
  if (upper.includes('UNION')) {
    return executeUnion(sql);
  }

  // Parse: SELECT <cols> FROM <table> WHERE <conditions>
  const selectMatch = sql.match(/SELECT\s+(.+?)\s+FROM\s+(\w+)(?:\s+WHERE\s+(.+?))?(?:\s+LIMIT\s+(\d+))?$/i);
  if (!selectMatch) return { error: `Syntax error in SQL query` };

  const [, colsPart, table, wherePart, limit] = selectMatch;
  const data = DB[table];
  if (!data) return { error: `Table '${table}' does not exist` };

  let rows = [...data];
  if (wherePart) {
    rows = filterRows(rows, wherePart);
  }

  if (limit) rows = rows.slice(0, parseInt(limit));

  const cols = parseColumns(colsPart, data);
  return { rows, cols, table };
}

function parseColumns(colsPart, sampleData) {
  if (colsPart.trim() === '*') {
    return sampleData.length > 0 ? Object.keys(sampleData[0]) : [];
  }
  return colsPart.split(',').map(c => c.trim());
}

function filterRows(rows, wherePart) {
  // Strip trailing comments (-- ...)
  let cond = wherePart.replace(/--.*$/, '').trim();
  if (cond.endsWith(';')) cond = cond.slice(0, -1).trim();

  // Split by OR (simple)
  const orParts = cond.split(/\s+OR\s+/i);

  return rows.filter(row => {
    return orParts.some(part => evaluateCondition(row, part.trim()));
  });
}

function evaluateCondition(row, cond) {
  // Handle AND
  const andParts = cond.split(/\s+AND\s+/i);
  return andParts.every(part => evaluateSingle(row, part.trim()));
}

function evaluateSingle(row, cond) {
  // Handle tautologies
  if (/^1\s*=\s*1$/.test(cond) || /^'.*'\s*=\s*'.*'$/.test(cond)) {
    const parts = cond.split('=').map(s => s.trim());
    return parts[0] === parts[1] || cond.includes('1=1') || cond.match(/^1\s*=\s*1$/);
  }
  if (/^\d+\s*=\s*\d+$/.test(cond)) {
    const [a, b] = cond.split('=').map(s => parseInt(s.trim()));
    return a === b;
  }

  // Handle col = 'value'
  const match = cond.match(/^(\w+)\s*=\s*'([^']*)'$/);
  if (match) {
    return String(row[match[1]]) === match[2];
  }

  // Handle col = number
  const numMatch = cond.match(/^(\w+)\s*=\s*(\d+)$/);
  if (numMatch) {
    return row[numMatch[1]] == numMatch[2];
  }

  return false;
}

function executeUnion(sql) {
  const parts = sql.split(/\s+UNION\s+(ALL\s+)?SELECT\s+/i);
  // Execute first SELECT
  const firstResult = executeSelect(parts[0]);
  if (firstResult.error) return firstResult;

  // Parse the union part
  const unionSql = 'SELECT ' + parts[parts.length - 1];
  const unionResult = executeSelect(unionSql);
  if (unionResult.error) return unionResult;

  return {
    rows: [...firstResult.rows, ...unionResult.rows],
    cols: firstResult.cols.length >= unionResult.cols.length ? firstResult.cols : unionResult.cols,
  };
}

function executeUpdate(sql) {
  const match = sql.match(/UPDATE\s+(\w+)\s+SET\s+(\w+)\s*=\s*'([^']+)'\s+WHERE\s+(\w+)\s*=\s*'([^']+)'/i);
  if (!match) return { error: 'Syntax error in UPDATE statement' };

  const [, table, setCol, setVal, whereCol, whereVal] = match;
  const data = DB[table];
  if (!data) return { error: `Table '${table}' does not exist` };

  let count = 0;
  data.forEach(row => {
    if (String(row[whereCol]) === whereVal) {
      row[setCol] = setVal;
      count++;
    }
  });

  return { updated: count, message: `${count} row(s) updated.` };
}

function switchTab(tabName) {
  document.querySelectorAll('.interaction-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));

  if (tabName === 'terminal') {
    document.getElementById('tabTerminal').classList.add('active');
    document.querySelector('[data-tab="terminal"]').classList.add('active');
    document.getElementById('terminalInput').focus();
  } else if (tabName === 'urlbar') {
    document.getElementById('tabUrlbar').classList.add('active');
    document.querySelector('[data-tab="urlbar"]').classList.add('active');
    document.getElementById('urlbarInput').focus();
  } else if (tabName === 'browser') {
    document.getElementById('tabBrowser').classList.add('active');
    document.querySelector('[data-tab="browser"]').classList.add('active');
    document.getElementById('loginUser').focus();
  }
}

// Configure which tabs are visible per stage
function updateTabsForStage(stageId) {
  const termBtn = document.querySelector('[data-tab="terminal"]');
  const urlBtn = document.querySelector('[data-tab="urlbar"]');
  const browserBtn = document.querySelector('[data-tab="browser"]');

  // Show all by default, then hide per stage
  termBtn.style.display = '';
  urlBtn.style.display = 'none';
  browserBtn.style.display = 'none';

  if (stageId === 'idor') {
    urlBtn.style.display = '';
  } else if (stageId === 'sql_injection') {
    browserBtn.style.display = '';
  }

  // Default to terminal tab
  switchTab('terminal');
}

function submitUrlbar() {
  const urlInput = document.getElementById('urlbarInput');
  const responseEl = document.getElementById('urlbarResponse');
  let path = urlInput.value.trim();

  if (!path) { responseEl.innerHTML = '<span class="err">Please enter a URL path.</span>'; return; }

  // Ensure path starts with /
  if (!path.startsWith('/')) path = '/' + path;

  // Route through the stage check as a visit command
  const fakeInput = `visit ${path}`;
  const stage = STAGES[currentStage];
  const result = stage.check(fakeInput);

  if (!result) {
    responseEl.innerHTML = '<span class="err">This URL cannot be visited in the current stage.</span>';
    return;
  }

  // Show the query in the SQL monitor
  if (result.query) displayQuery(result.query);
  if (result.result) displayResult(result.result);

  // Show the response in the URL bar response area
  if (result.terminalMsg) {
    responseEl.innerHTML = result.terminalMsg.split('\n').map(line => `<div>${line || '&nbsp;'}</div>`).join('');
  }

  // Also echo in terminal
  printTerminal(`<span class="sys">hacklab&gt;</span> ${escapeHtml(fakeInput)}`);
  if (result.terminalMsg) {
    result.terminalMsg.split('\n').forEach(line => printTerminal(line));
  }

  if (result.pass) {
    showSuccess(stage);
  }
}

function submitLoginForm() {
  const username = document.getElementById('loginUser').value;
  const password = document.getElementById('loginPass').value;
  const errorEl = document.getElementById('loginError');

  if (!username) { errorEl.textContent = 'Please enter a username.'; return; }

  // Route through the same stage check as the terminal
  const fakeInput = `login ${username} ${password}`;
  const stage = STAGES[currentStage];
  const result = stage.check(fakeInput);

  if (!result) {
    errorEl.textContent = 'Login is not available in this stage.';
    return;
  }

  // Show the query in the SQL monitor
  if (result.query) displayQuery(result.query);
  if (result.result) displayResult(result.result);

  // Print the attempt in the terminal too
  printTerminal(`<span class="sys">hacklab&gt;</span> ${escapeHtml(fakeInput)}`);
  if (result.terminalMsg) {
    result.terminalMsg.split('\n').forEach(line => printTerminal(line));
  }

  if (result.pass) {
    errorEl.innerHTML = '<span style="color: var(--green)">Access granted!</span>';
    showSuccess(stage);
  } else {
    errorEl.textContent = result.result?.error || 'Access denied.';
  }
}

function tokenizeSql(sql) {
  const KEYWORDS = new Set([
    'SELECT','FROM','WHERE','AND','OR','NOT','IN','IS','NULL','LIKE',
    'BETWEEN','EXISTS','CASE','WHEN','THEN','ELSE','END','AS',
    'JOIN','INNER','LEFT','RIGHT','OUTER','CROSS','ON',
    'INSERT','INTO','VALUES','UPDATE','SET','DELETE','DROP',
    'CREATE','ALTER','TABLE','INDEX','VIEW','DATABASE',
    'UNION','ALL','DISTINCT','ORDER','BY','GROUP','HAVING',
    'LIMIT','OFFSET','ASC','DESC','TRUE','FALSE',
  ]);
  const FUNCTIONS = new Set([
    'COUNT','SUM','AVG','MIN','MAX','UPPER','LOWER','LENGTH',
    'CONCAT','SUBSTRING','TRIM','COALESCE','CAST','CONVERT',
    'NOW','CURRENT_TIMESTAMP','IFNULL','NULLIF',
  ]);

  const tokens = [];
  let i = 0;

  while (i < sql.length) {
    // Whitespace
    if (/\s/.test(sql[i])) {
      let start = i;
      while (i < sql.length && /\s/.test(sql[i])) i++;
      tokens.push({ type: 'ws', value: sql.slice(start, i) });
      continue;
    }
    // Single-line comment --
    if (sql[i] === '-' && sql[i + 1] === '-') {
      let start = i;
      while (i < sql.length && sql[i] !== '\n') i++;
      tokens.push({ type: 'comment', value: sql.slice(start, i) });
      continue;
    }
    // String literal
    if (sql[i] === "'") {
      let start = i; i++;
      while (i < sql.length && sql[i] !== "'") i++;
      if (i < sql.length) i++; // closing quote
      tokens.push({ type: 'string', value: sql.slice(start, i) });
      continue;
    }
    // Number
    if (/\d/.test(sql[i])) {
      let start = i;
      while (i < sql.length && /[\d.]/.test(sql[i])) i++;
      tokens.push({ type: 'number', value: sql.slice(start, i) });
      continue;
    }
    // Identifier / keyword
    if (/[a-zA-Z_]/.test(sql[i])) {
      let start = i;
      while (i < sql.length && /[a-zA-Z0-9_]/.test(sql[i])) i++;
      const word = sql.slice(start, i);
      const upper = word.toUpperCase();
      if (KEYWORDS.has(upper)) tokens.push({ type: 'keyword', value: word });
      else if (FUNCTIONS.has(upper)) tokens.push({ type: 'function', value: word });
      else tokens.push({ type: 'identifier', value: word });
      continue;
    }
    // Operators and punctuation
    if (sql[i] === '*') { tokens.push({ type: 'star', value: '*' }); i++; continue; }
    if (sql[i] === '(' || sql[i] === ')') { tokens.push({ type: 'paren', value: sql[i] }); i++; continue; }
    if (sql[i] === ',') { tokens.push({ type: 'comma', value: ',' }); i++; continue; }
    if (sql[i] === '=' || sql[i] === '<' || sql[i] === '>' || sql[i] === '!') {
      let start = i; i++;
      if (i < sql.length && sql[i] === '=') i++;
      tokens.push({ type: 'operator', value: sql.slice(start, i) });
      continue;
    }
    if (sql[i] === ';') { tokens.push({ type: 'operator', value: ';' }); i++; continue; }
    // Fallback
    tokens.push({ type: 'default', value: sql[i] }); i++;
  }
  return tokens;
}

function displayQuery(sql) {
  const tokens = tokenizeSql(sql);
  const codeHtml = tokens.map(t => {
    const escaped = escapeHtml(t.value);
    const cls = `sql-${t.type}`;
    if (t.type === 'ws') return escaped;
    return `<span class="${cls}">${escaped}</span>`;
  }).join('');

  // Count lines for line numbers
  const lines = sql.split('\n');
  const lineNums = lines.map((_, i) => `<div>${i + 1}</div>`).join('');

  document.getElementById('queryDisplay').innerHTML =
    `<div class="editor-topbar"><span class="tab">query.sql</span><span>HackLab Monitor</span></div>` +
    `<div class="editor-body">` +
    `<div class="line-numbers">${lineNums}</div>` +
    `<div class="code-area">${codeHtml}</div>` +
    `</div>`;
}

function displayResult(result) {
  const el = document.getElementById('queryResult');

  if (result.error) {
    el.className = 'query-result error';
    el.textContent = result.error;
    return;
  }

  if (result.updated !== undefined) {
    el.className = 'query-result success';
    el.textContent = result.message;
    return;
  }

  if (result.rows && result.rows.length > 0) {
    el.className = 'query-result success';
    const cols = result.cols || Object.keys(result.rows[0]);
    let tableHtml = '<table class="result-table"><tr>';
    cols.forEach(c => tableHtml += `<th>${c}</th>`);
    tableHtml += '</tr>';
    result.rows.forEach(row => {
      tableHtml += '<tr>';
      cols.forEach(c => tableHtml += `<td>${row[c] !== undefined ? row[c] : 'NULL'}</td>`);
      tableHtml += '</tr>';
    });
    tableHtml += '</table>';
    el.innerHTML = tableHtml;
  } else {
    el.className = 'query-result';
    el.textContent = 'Query returned 0 rows.';
  }
}

// ========== COMMAND PARSER ==========
function parseCommand(input) {
  const raw = input.trim();
  const cmdMatch = raw.match(/^([\w-]+)\s*(.*)/);
  if (!cmdMatch) return { cmd: '', args: [] };

  const cmd = cmdMatch[1].toLowerCase();
  const argStr = cmdMatch[2];

  // For search: everything after 'search' is the search term
  if (cmd === 'search' && argStr) {
    return { cmd, args: [argStr], rawArgs: argStr, raw };
  }

  // For ping: preserve the full raw args (semicolons, pipes, etc. matter)
  if (cmd === 'ping' && argStr) {
    return { cmd, args: [argStr], rawArgs: argStr, raw };
  }

  // For login: detect if input looks like SQL injection (contains ' or SQL keywords)
  // If so, treat everything as the username (injection target)
  // Otherwise split into [username, password]
  if (cmd === 'login' && argStr) {
    const looksLikeInjection = /['";]|(\bOR\b)|(\bUNION\b)|(\bAND\b)|(\bSELECT\b)|(--)/i.test(argStr);
    if (looksLikeInjection) {
      return { cmd, args: [argStr, ''], raw };
    }
    const parts = argStr.split(/\s+/);
    return { cmd, args: [parts[0], parts.slice(1).join(' ')], raw };
  }

  const args = argStr ? argStr.split(/\s+/) : [];
  return { cmd, args, raw };
}

function handleInput() {
  const input = document.getElementById('terminalInput');
  const raw = input.value.trim();
  input.value = '';

  // Always echo the prompt line (empty enter = blank prompt, like a real terminal)
  printTerminal(`<span class="sys">hacklab&gt;</span> ${raw ? escapeHtml(raw) : ''}`);

  if (!raw) return;

  commandHistory.push(raw);
  historyIndex = commandHistory.length;

  const parts = parseCommand(raw);

  switch (parts.cmd) {
    case 'help': {
      const stageId = STAGES[currentStage].id;
      printTerminal(`<span class="info">Available commands:</span>`);
      if (stageId === 'intro' || stageId === 'sql_injection') printTerminal(`  <span class="cmd">login [user] [pass]</span>  - Attempt login`);
      if (stageId === 'intro') printTerminal(`  <span class="cmd">view-source</span>         - View page source code`);
      if (stageId === 'idor') printTerminal(`  <span class="cmd">visit [url]</span>         - Visit a URL on the portal`);
      if (stageId === 'xss') printTerminal(`  <span class="cmd">search [term]</span>       - Search the employee directory`);
      if (stageId === 'command_injection') printTerminal(`  <span class="cmd">ping [host]</span>         - Run server diagnostic tool`);
      printTerminal(`  <span class="cmd">hint</span>                - Get a hint`);
      printTerminal(`  <span class="cmd">next</span>                - Go to next stage`);
      printTerminal(`  <span class="cmd">restart</span>             - Restart from stage 1`);
      printTerminal(`  <span class="cmd">clear</span>               - Clear terminal`);
      printTerminal(`  <span class="cmd">status</span>              - Show current stage`);
      printTerminal(`  <span class="cmd">help</span>                - Show this message`);
      break;
    }

    case 'hint':
      showHint();
      break;

    case 'clear':
      document.getElementById('terminalOutput').innerHTML = '';
      break;

    case 'status':
      printTerminal(`<span class="info">Current: ${STAGES[currentStage].title}</span>`);
      printTerminal(`<span class="info">Progress: ${completedStages.size}/${STAGES.length} stages completed</span>`);
      break;

    case 'next':
      if (stageCompleted && currentStage < STAGES.length - 1) {
        nextStage();
      } else if (!stageCompleted) {
        printTerminal(`<span class="err">Complete the current stage first.</span>`);
      } else {
        printTerminal(`<span class="info">No more stages. Type <span class="cmd">restart</span> to play again.</span>`);
      }
      break;

    case 'restart':
      Object.keys(stageTerminalHistory).forEach(k => delete stageTerminalHistory[k]);
      document.getElementById('terminalOutput').innerHTML = '';
      loadStage(0);
      printTerminal('<span class="sys">HackLab v1.0 restarted.</span>');
      printTerminal('');
      break;

    case 'visit':
    case 'view-source':
    case 'login':
    case 'search':
    case 'ping':
      const stage = STAGES[currentStage];
      const result = stage.check(raw);
      if (result === null) {
        printTerminal(`<span class="err">Command '${parts.cmd}' is not available in this stage.</span>`);
        break;
      }
      if (result.query) displayQuery(result.query);
      if (result.result) displayResult(result.result);
      if (result.terminalMsg) {
        result.terminalMsg.split('\n').forEach(line => printTerminal(line));
      }
      if (result.pass) {
        showSuccess(stage);
      }
      break;

    default:
      printTerminal(`<span class="err">Unknown command: ${parts.cmd}. Type 'help' for commands.</span>`);
  }
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// Command history navigation
document.getElementById('terminalInput').addEventListener('keydown', function(e) {
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (historyIndex > 0) {
      historyIndex--;
      this.value = commandHistory[historyIndex];
    }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (historyIndex < commandHistory.length - 1) {
      historyIndex++;
      this.value = commandHistory[historyIndex];
    } else {
      historyIndex = commandHistory.length;
      this.value = '';
    }
  }
});

// ========== RESIZABLE PANELS ==========
(function() {
  const hHandle = document.getElementById('hHandle');
  const vHandle = document.getElementById('vHandle');
  const mainSplit = document.querySelector('.main-split');
  const leftCol = document.querySelector('.left-col');
  const rightCol = document.querySelector('.right-col');
  const queryPanel = document.querySelector('.query-panel');
  const interactionPanel = document.querySelector('.interaction-panel');

  // Horizontal resize (left/right columns)
  let draggingH = false;
  hHandle.addEventListener('mousedown', (e) => {
    e.preventDefault();
    draggingH = true;
    hHandle.classList.add('active');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });

  // Vertical resize (query/terminal in right column)
  let draggingV = false;
  vHandle.addEventListener('mousedown', (e) => {
    e.preventDefault();
    draggingV = true;
    vHandle.classList.add('active');
    document.body.style.cursor = 'row-resize';
    document.body.style.userSelect = 'none';
  });

  document.addEventListener('mousemove', (e) => {
    if (draggingH) {
      const rect = mainSplit.getBoundingClientRect();
      const pct = ((e.clientX - rect.left) / rect.width) * 100;
      const clamped = Math.max(20, Math.min(80, pct));
      leftCol.style.flex = `0 0 ${clamped}%`;
      rightCol.style.flex = `0 0 ${100 - clamped}%`;
    }
    if (draggingV) {
      const rect = rightCol.getBoundingClientRect();
      const offset = e.clientY - rect.top;
      const pct = (offset / rect.height) * 100;
      const clamped = Math.max(15, Math.min(85, pct));
      queryPanel.style.flex = `0 0 ${clamped}%`;
      interactionPanel.style.flex = `0 0 ${100 - clamped - 2}%`;
    }
  });

  document.addEventListener('mouseup', () => {
    if (draggingH) {
      draggingH = false;
      hHandle.classList.remove('active');
    }
    if (draggingV) {
      draggingV = false;
      vHandle.classList.remove('active');
    }
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
})();

// Click-to-focus: only focus input if user clicked without dragging to select
(function() {
  const panel = document.querySelector('.terminal-panel');
  let mouseDownPos = null;
  panel.addEventListener('mousedown', (e) => {
    mouseDownPos = { x: e.clientX, y: e.clientY };
  });
  panel.addEventListener('mouseup', (e) => {
    if (!mouseDownPos) return;
    const dx = Math.abs(e.clientX - mouseDownPos.x);
    const dy = Math.abs(e.clientY - mouseDownPos.y);
    // Only focus if it was a click (not a drag/selection)
    if (dx < 5 && dy < 5 && !window.getSelection().toString()) {
      document.getElementById('terminalInput').focus();
    }
    mouseDownPos = null;
  });
})();

// Start the game
initGame();
</script>
